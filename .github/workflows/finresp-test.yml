name: Finresp engine tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Engine unit tests
        run: npm run test:engine
      - name: Live-tail integration tests
        run: npm run test:live-tail
      - name: Perf regression tests
        run: npm run test:perf
